<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 물류 계산기 v4.5</title>
    <link rel="apple-touch-icon" href="https://api.iconify.design/fluent-emoji:package.svg">
    <link rel="icon" type="image/svg+xml" href="https://api.iconify.design/fluent-emoji:package.svg">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background-color: #f7f9fa; color: #333; padding-bottom: 90px; }
        .container { max-width: 500px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: #111; font-size: 20px; display: flex; justify-content: space-between; align-items: center; }
        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; background: #fff; }
        textarea { resize: vertical; min-height: 70px; font-family: inherit; font-size: 14px; }
        
        .toggle-container { display: flex; gap: 10px; margin-top: 5px; }
        .toggle-btn { flex: 1; padding: 12px; border: 1px solid #ddd; background: #f8f9fa; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; color: #666; }
        .toggle-btn.active { background: #007aff; color: white; border-color: #007aff; }

        .search-dropdown { position: absolute; top: 100%; left: 0; width: 100%; max-height: 150px; overflow-y: auto; background: #fff; border: 1px solid #ddd; border-top: none; border-radius: 0 0 8px 8px; z-index: 100; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .search-item { padding: 12px; cursor: pointer; font-size: 15px; border-bottom: 1px solid #f1f1f1; }
        .search-item:hover { background: #f0f7ff; }

        button.main-btn { width: 100%; background-color: #007aff; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button.main-btn:hover { background-color: #0056b3; }
        
        .sub-btn { padding: 5px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }
        .edit-btn { background: #ff9500; color: white; }
        .del-btn { background: #ff3b30; color: white; }
        .add-action-btn { background: #34c759; color: white; font-size: 13px; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }

        .status-msg { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; text-align: center; display: none; }
        .status-msg.success { background: #e1f5fe; color: #0288d1; display: block; }
        .status-msg.error { background: #ffebee; color: #c62828; display: block; }

        .result-box { margin-top: 20px; padding: 15px 15px 25px 15px; background: #eef4ff; border-radius: 8px; font-weight: 600; line-height: 1.8; font-size: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .conditional-fields { display: none; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: #fff; border-top: 1px solid #ddd; display: flex; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; background: none; border: none; gap: 2px; }
        .nav-item.active { color: #007aff; background: #f0f7ff; }
        .nav-item span.icon { font-size: 20px; }

        .password-screen { text-align: center; padding: 30px 10px; }
        .password-screen input { text-align: center; letter-spacing: 5px; font-size: 24px; margin-bottom: 15px; }
        
        .product-card { background: #fcfcfc; border: 1px solid #e1e4e8; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .product-top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .product-name-txt { font-weight: bold; font-size: 15px; color: #111; }
        
        .spec-table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 12px; background: #f4f6f8; border-radius: 6px; overflow: hidden; text-align: center; }
        .spec-table th { background: #e9ecf0; color: #444; padding: 6px 2px; font-weight: 600; border-bottom: 1px solid #ddd; }
        .spec-table td { padding: 7px 2px; color: #333; font-weight: 500; }
        .spec-table tr:not(:last-child) td { border-bottom: 1px solid #e1e4e8; }

        .edit-form-box { background: #fff; border: 1px solid #007aff; border-radius: 8px; padding: 12px; margin-top: 10px; display: none; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #fff; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .diet-card { background: #f8f9fa; border: 1px solid #e1e4e8; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
        .diet-card.today { background: #f0f7ff; border-color: #007aff; box-shadow: 0 2px 6px rgba(0,122,255,0.1); }
        .diet-day { font-weight: bold; font-size: 15px; color: #111; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .diet-badge { background: #007aff; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .diet-menu { font-size: 13.5px; color: #444; line-height: 1.5; white-space: pre-line; min-height: 20px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="calcTab" class="container tab-content active">
        <h2>📦 현장 물류 계산기</h2>
        <div class="input-group">
            <label for="productSearchInput">제품 검색</label>
            <input type="text" id="productSearchInput" placeholder="제품명을 입력해 검색하세요" oninput="filterProducts()" autocomplete="off">
            <div id="productSearchDropdown" class="search-dropdown"></div>
            <input type="hidden" id="selectedProductId">
        </div>
        <div class="input-group">
            <label>입력 기준 선택</label>
            <div class="toggle-container">
                <button type="button" id="calcModeSet" class="toggle-btn active" onclick="setCalcMode('SET')">세트/단케이스 기준</button>
                <button type="button" id="calcModeEa" class="toggle-btn" onclick="setCalcMode('EA')">개수(반제품) 기준</button>
            </div>
        </div>
        <div class="input-group">
            <label for="inputQty">입력 수량</label>
            <input type="number" id="inputQty" placeholder="수량을 입력하세요" onfocus="this.select()" onkeydown="handleCalcKey(event)">
        </div>
        <button class="main-btn" onclick="calculateUnits()">환산하기</button>
        <div id="calcResult" class="result-box">결과가 여기에 표시됩니다.</div>
    </div>

    <div id="dietTab" class="container tab-content">
        <h2>
            🍚 식단표 <span id="dietPeriodTitle" style="font-size:14px; font-weight:normal; color:#666;"></span>
            <button class="sub-btn edit-btn" onclick="toggleDietEdit()">식단 수정</button>
        </h2>
        <p style="font-size: 12.5px; color: #666; margin-bottom: 12px;">이번 주 구내식당 중식 식단 안내입니다. (PC/모바일 연동)</p>
        
        <div id="dietEditBox" style="background:#f8f9fa; border:1px solid #007aff; padding:12px; border-radius:8px; margin-bottom:15px; display:none;">
            <p style="font-size:11.5px; color:#007aff; margin-top:0; font-weight:bold;">* 복사한 텍스트를 각 요일에 붙여넣으세요 (줄바꿈 포함)</p>
            <div class="input-group"><label id="editLabel_mon">월요일</label><textarea id="editDiet_mon" onfocus="this.select()"></textarea></div>
            <div class="input-group"><label id="editLabel_tue">화요일</label><textarea id="editDiet_tue" onfocus="this.select()"></textarea></div>
            <div class="input-group"><label id="editLabel_wed">수요일</label><textarea id="editDiet_wed" onfocus="this.select()"></textarea></div>
            <div class="input-group"><label id="editLabel_thu">목요일</label><textarea id="editDiet_thu" onfocus="this.select()"></textarea></div>
            <div class="input-group"><label id="editLabel_fri">금요일</label><textarea id="editDiet_fri" onfocus="this.select()"></textarea></div>
            <button class="main-btn" style="padding:10px; font-size:14px; background:#34c759;" onclick="saveDietTable()">식단 저장하기</button>
        </div>

        <div id="dietListContainer">
            <div class="diet-card" id="diet_mon">
                <div class="diet-day"><span id="dayLabel_mon">월요일</span> <span class="diet-badge" style="display:none;" id="badge_mon">오늘</span></div>
                <div class="diet-menu" id="menu_mon">불러오는 중...</div>
            </div>
            <div class="diet-card" id="diet_tue">
                <div class="diet-day"><span id="dayLabel_tue">화요일</span> <span class="diet-badge" style="display:none;" id="badge_tue">오늘</span></div>
                <div class="diet-menu" id="menu_tue">불러오는 중...</div>
            </div>
            <div class="diet-card" id="diet_wed">
                <div class="diet-day"><span id="dayLabel_wed">수요일</span> <span class="diet-badge" style="display:none;" id="badge_wed">오늘</span></div>
                <div class="diet-menu" id="menu_wed">불러오는 중...</div>
            </div>
            <div class="diet-card" id="diet_thu">
                <div class="diet-day"><span id="dayLabel_thu">목요일</span> <span class="diet-badge" style="display:none;" id="badge_thu">오늘</span></div>
                <div class="diet-menu" id="menu_thu">불러오는 중...</div>
            </div>
            <div class="diet-card" id="diet_fri">
                <div class="diet-day"><span id="dayLabel_fri">금요일</span> <span class="diet-badge" style="display:none;" id="badge_fri">오늘</span></div>
                <div class="diet-menu" id="menu_fri">불러오는 중...</div>
            </div>
        </div>
    </div>

    <div id="manageTab" class="container tab-content">
        <div id="passwordScreen" class="password-screen">
            <h2>🔒 관리자 인증</h2>
            <p style="font-size: 14px; color: #666; margin-bottom: 20px;">제품관리를 위해 비밀번호를 입력하세요.</p>
            <input type="password" id="adminPasswordInput" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" onfocus="this.select()" onkeydown="handlePasswordKey(event)">
            <button class="main-btn" onclick="checkAdminPassword()">확인</button>
            <div id="pwErrorMsg" class="status-msg error" style="margin-top: 15px; display: none;">비밀번호가 틀렸습니다.</div>
        </div>

        <div id="adminContent" style="display:none;">
            <h2>
                📦 제품 관리
                <button class="add-action-btn" onclick="openAddModal()">+ 새 제품 추가</button>
            </h2>
            
            <div class="input-group" style="margin-top: 15px; margin-bottom: 12px;">
                <input type="text" id="adminFilterInput" placeholder="🔍 등록된 품목 검색" oninput="filterAdminList()" autocomplete="off">
            </div>

            <div>
                <label style="margin-bottom: 8px; font-size: 13px; color: #666;">등록된 품목 리스트 (가나다순)</label>
                <div id="productListContainer">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <div id="addProductModal" class="modal-overlay">
        <div class="modal-box">
            <h2 style="font-size: 18px; color: #34c759; margin-bottom: 15px;">
                📦 새 제품 추가하기
                <button type="button" class="sub-btn del-btn" style="padding: 4px 8px; font-size: 12px;" onclick="closeAddModal()">닫기</button>
            </h2>
            <div class="input-group">
                <label for="regProductName">제품이름</label>
                <input type="text" id="regProductName" placeholder="예: A제품" onfocus="this.select()">
            </div>
            <div class="input-group">
                <label>세트케이스 유무</label>
                <div class="toggle-container">
                    <button type="button" id="setBtnO" class="toggle-btn" onclick="selectSetOption('O', 'reg')">있음 (O)</button>
                    <button type="button" id="setBtnX" class="toggle-btn active" onclick="selectSetOption('X', 'reg')">없음 (X)</button>
                </div>
                <input type="hidden" id="hasSetValue" value="X">
            </div>
            <div class="input-group">
                <label for="regPalletToCarton">파레트당 카톤 수</label>
                <input type="number" id="regPalletToCarton" placeholder="예: 24" onfocus="this.select()">
            </div>
            <div id="setFieldsO" class="conditional-fields">
                <div class="input-group">
                    <label for="regCartonToSet">카톤당 세트케이스 수</label>
                    <input type="number" id="regCartonToSet" placeholder="예: 5" onfocus="this.select()">
                </div>
                <div class="input-group">
                    <label for="regSetToInner">세트케이스당 단케이스 수</label>
                    <input type="number" id="regSetToInner" placeholder="예: 6" onfocus="this.select()">
                </div>
            </div>
            <div id="setFieldsX" class="conditional-fields" style="display:block;">
                <div class="input-group">
                    <label for="regCartonToInnerX">카톤당 단케이스 수</label>
                    <input type="number" id="regCartonToInnerX" placeholder="예: 30" onfocus="this.select()">
                </div>
            </div>
            <div class="input-group">
                <label for="regInnerToUnit">단케이스당 반제품 수</label>
                <input type="number" id="regInnerToUnit" placeholder="예: 10" onfocus="this.select()" onkeydown="handleRegKey(event)">
            </div>
            <button class="main-btn" style="background-color: #34c759;" onclick="saveProductConfig()">등록 완료</button>
            <div id="regStatusMsg" class="status-msg"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('calcTab', this)"><span class="icon">📦</span>계산기</button>
        <button class="nav-item" onclick="switchTab('dietTab', this)"><span class="icon">🍚</span>식단표</button>
        <button class="nav-item" onclick="switchTab('manageTab', this)"><span class="icon">⚙️</span>제품관리</button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxsMwsCYRP4AlCcUDVdg_xVb2yq3aREhg",
            authDomain: "logistics-f678d.firebaseapp.com",
            projectId: "logistics-f678d",
            storageBucket: "logistics-f678d.firebasestorage.app",
            messagingSenderId: "307386603286",
            appId: "1:307386603286:web:6a55d51ee4264812ece237"
        };
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        let productList = [];
        let currentCalcMode = 'SET'; 
        let isAdminAuthenticated = false;
        let currentMondayKey = '';

        initDietSystem();

        function initDietSystem() {
            const weekDates = getThisWeekDates();
            currentMondayKey = weekDates[0].dateStr; 

            document.getElementById('dietPeriodTitle').innerText = `(${weekDates[0].formatted} ~ ${weekDates[4].formatted})`;

            const daysKeyMap = ['mon', 'tue', 'wed', 'thu', 'fri'];
            weekDates.forEach((w, idx) => {
                const k = daysKeyMap[idx];
                document.getElementById(`dayLabel_${k}`).innerText = `${w.formatted} (${w.dayName})`;
                document.getElementById(`editLabel_${k}`).innerText = `${w.formatted} (${w.dayName})`;
            });

            highlightTodayDiet(weekDates);
            loadDietFromFirestore();
        }

        function getThisWeekDates() {
            const now = new Date();
            const day = now.getDay();
            const diffToMonday = (day === 0) ? 1 : (1 - day); 
            const monday = new Date(now.setDate(now.getDate() + diffToMonday));
            
            const week = [];
            const dayNames = ['일', '월', '화', '수', '목', '금', '토'];

            for (let i = 0; i < 5; i++) {
                const tempDate = new Date(monday);
                tempDate.setDate(monday.getDate() + i);
                
                const m = String(tempDate.getMonth() + 1).padStart(2, '0');
                const d = String(tempDate.getDate()).padStart(2, '0');
                const dateStr = `${tempDate.getFullYear()}-${m}-${d}`;
                const formatted = `${m}-${d}`;
                const dayName = dayNames[tempDate.getDay()];
                
                week.push({ dateStr, formatted, dayName });
            }
            return week;
        }

        function highlightTodayDiet(weekDates) {
            const daysKeyMap = ['mon', 'tue', 'wed', 'thu', 'fri'];
            const todayObj = new Date();
            const tm = String(todayObj.getMonth() + 1).padStart(2, '0');
            const td = String(todayObj.getDate()).padStart(2, '0');
            const todayFormatted = `${tm}-${td}`;

            weekDates.forEach((w, idx) => {
                const k = daysKeyMap[idx];
                if (w.formatted === todayFormatted) {
                    document.getElementById(`diet_${k}`).classList.add('today');
                    document.getElementById(`badge_${k}`).style.display = 'inline-block';
                }
            });
        }

        function toggleDietEdit() {
            const box = document.getElementById('dietEditBox');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
            if (box.style.display === 'block') {
                ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(d => {
                    const currentText = document.getElementById(`menu_${d}`).innerHTML;
                    document.getElementById(`editDiet_${d}`).value = (currentText === '' || currentText === '등록된 식단이 없습니다.') ? '' : currentText.replace(/<br\s*[\/]?>/gi, '\n');
                });
            }
        }

        async function saveDietTable() {
            const dietData = {};
            ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(d => {
                const val = document.getElementById(`editDiet_${d}`).value.trim();
                dietData[d] = val ? val.replace(/\n/g, '<br>') : '';
            });

            try {
                await db.collection('diets').doc(currentMondayKey).set({
                    ...dietData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(d => {
                    document.getElementById(`menu_${d}`).innerHTML = dietData[d] || '<span style="color:#aaa;">식단 미등록</span>';
                });
                
                toggleDietEdit();
                alert('✅ 식단이 파이어스토어에 저장되어 연동되었습니다.');
            } catch (e) {
                console.error("식단 저장 실패:", e);
                alert('❌ 식단 저장 중 오류가 발생했습니다.');
            }
        }

        async function loadDietFromFirestore() {
            try {
                const docRef = db.collection('diets').doc(currentMondayKey);
                const doc = await docRef.get();
                
                if (doc.exists) {
                    const data = doc.data();
                    ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(d => {
                        const content = data[d];
                        document.getElementById(`menu_${d}`).innerHTML = content ? content : '<span style="color:#aaa;">식단 미등록</span>';
                    });
                } else {
                    ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(d => {
                        document.getElementById(`menu_${d}`).innerHTML = '<span style="color:#aaa;">식단 미등록</span>';
                    });
                }
            } catch (e) {
                console.error("식단 불러오기 실패:", e);
                ['mon', 'tue', 'wed', 'thu', 'fri'].forEach(d => {
                    document.getElementById(`menu_${d}`).innerText = '식단 불러오기 오류';
                });
            }
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            if (tabId === 'calcTab') {
                loadProductList();
            } else if (tabId === 'dietTab') {
                loadDietFromFirestore();
            } else if (tabId === 'manageTab') {
                if (isAdminAuthenticated) renderProductAdminList();
            }
        }

        function checkAdminPassword() {
            const inputEl = document.getElementById('adminPasswordInput');
            const inputVal = inputEl.value;
            if (inputVal === "3417") {
                isAdminAuthenticated = true;
                document.getElementById('passwordScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderProductAdminList();
            } else {
                document.getElementById('pwErrorMsg').style.display = 'block';
                inputEl.value = ''; // 틀렸을 때 입력창 비우기
                inputEl.focus();    // 다시 바로 입력할 수 있게 포커스 이동
                setTimeout(() => { document.getElementById('pwErrorMsg').style.display = 'none'; }, 2500);
            }
        }
        function handlePasswordKey(e) { if (e.key === 'Enter') checkAdminPassword(); }

        function openAddModal() { document.getElementById('addProductModal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('addProductModal').style.display = 'none'; }

        function selectSetOption(val, prefix, editId = '') {
            const hasSetId = editId ? `editHasSetValue_${editId}` : 'hasSetValue';
            document.getElementById(hasSetId).value = val;
            
            if (editId) {
                if (val === 'O') {
                    document.getElementById(`editSetBtnO_${editId}`).classList.add('active');
                    document.getElementById(`editSetBtnX_${editId}`).classList.remove('active');
                    document.getElementById(`editSetFieldsO_${editId}`).style.display = 'block';
                    document.getElementById(`editSetFieldsX_${editId}`).style.display = 'none';
                } else {
                    document.getElementById(`editSetBtnX_${editId}`).classList.add('active');
                    document.getElementById(`editSetBtnO_${editId}`).classList.remove('active');
                    document.getElementById(`editSetFieldsO_${editId}`).style.display = 'none';
                    document.getElementById(`editSetFieldsX_${editId}`).style.display = 'block';
                }
            } else {
                if (val === 'O') {
                    document.getElementById('setBtnO').classList.add('active');
                    document.getElementById('setBtnX').classList.remove('active');
                    document.getElementById('setFieldsO').style.display = 'block';
                    document.getElementById('setFieldsX').style.display = 'none';
                } else {
                    document.getElementById('setBtnX').classList.add('active');
                    document.getElementById('setBtnO').classList.remove('active');
                    document.getElementById('setFieldsO').style.display = 'none';
                    document.getElementById('setFieldsX').style.display = 'block';
                }
            }
        }

        function showRegStatus(message, isSuccess = true) {
            const msgBox = document.getElementById('regStatusMsg');
            msgBox.className = `status-msg ${isSuccess ? 'success' : 'error'}`;
            msgBox.innerText = message;
            msgBox.style.display = 'block';
            setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
        }

        async function saveProductConfig() {
            const name = document.getElementById('regProductName').value;
            const hasSet = document.getElementById('hasSetValue').value;
            const pToC = document.getElementById('regPalletToCarton').value;
            const innerToUnit = document.getElementById('regInnerToUnit').value;

            let data = { name, hasSet, palletToCarton: Number(pToC), innerToUnit: Number(innerToUnit), timestamp: new Date() };

            if (hasSet === 'O') {
                data.cartonToSet = Number(document.getElementById('regCartonToSet').value);
                data.setToInner = Number(document.getElementById('regSetToInner').value);
                if (!name || !pToC || !data.cartonToSet || !data.setToInner || !innerToUnit) {
                    showRegStatus('⚠️ 모든 항목을 빠짐없이 입력해 주세요.', false);
                    return;
                }
            } else {
                data.cartonToInner = Number(document.getElementById('regCartonToInnerX').value);
                if (!name || !pToC || !data.cartonToInner || !innerToUnit) {
                    showRegStatus('⚠️ 모든 항목을 빠짐없이 입력해 주세요.', false);
                    return;
                }
            }

            try {
                await db.collection('products').add(data);
                alert(`✅ [${name}] 등록이 완료되었습니다.`);
                document.getElementById('regProductName').value = '';
                document.getElementById('regPalletToCarton').value = '';
                document.getElementById('regCartonToSet').value = '';
                document.getElementById('regSetToInner').value = '';
                document.getElementById('regCartonToInnerX').value = '';
                document.getElementById('regInnerToUnit').value = '';
                closeAddModal();
                renderProductAdminList();
            } catch (e) {
                showRegStatus('❌ 등록에 실패했습니다.', false);
            }
        }
        function handleRegKey(e) { if (e.key === 'Enter') saveProductConfig(); }

        async function loadProductList() {
            productList = [];
            const snapshot = await db.collection('products').orderBy('name', 'asc').get();
            snapshot.forEach(doc => { productList.push({ id: doc.id, ...doc.data() }); });
        }

        async function renderProductAdminList() {
            await loadProductList();
            drawAdminListHtml(productList);
        }

        function filterAdminList() {
            const keyword = document.getElementById('adminFilterInput').value.toLowerCase();
            const filtered = productList.filter(p => p.name.toLowerCase().includes(keyword));
            drawAdminListHtml(filtered);
        }

        function drawAdminListHtml(list) {
            const container = document.getElementById('productListContainer');
            if (list.length === 0) {
                container.innerHTML = '<p style="color:#666; font-size:13px; text-align:center; padding:15px;">검색된 품목이 없습니다.</p>';
                return;
            }

            let html = '';
            list.forEach(p => {
                let cartonVal = (p.hasSet === 'O') ? `${p.cartonToSet}개/세트` : `${p.cartonToInner}개`;
                let setVal = (p.hasSet === 'O') ? `${p.setToInner}개` : '-';

                html += `
                    <div class="product-card" id="card_${p.id}">
                        <div class="product-top-row">
                            <span class="product-name-txt">📦 ${p.name}</span>
                            <div>
                                <button class="sub-btn edit-btn" onclick="toggleEditForm('${p.id}')">수정</button>
                                <button class="sub-btn del-btn" onclick="deleteProduct('${p.id}', '${p.name}')">삭제</button>
                            </div>
                        </div>
                        
                        <table class="spec-table">
                            <thead>
                                <tr>
                                    <th>파레트/카톤</th>
                                    <th>카톤/세트(단)</th>
                                    <th>세트/단</th>
                                    <th>단/반제품</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>${p.palletToCarton}박스</td>
                                    <td>${cartonVal}</td>
                                    <td>${setVal}</td>
                                    <td>${p.innerToUnit}개</td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <div class="edit-form-box" id="editForm_${p.id}">
                            <div class="input-group">
                                <label>제품이름</label>
                                <input type="text" id="editName_${p.id}" value="${p.name}" onfocus="this.select()">
                            </div>
                            <div class="input-group">
                                <label>세트케이스 유무</label>
                                <div class="toggle-container">
                                    <button type="button" id="editSetBtnO_${p.id}" class="toggle-btn ${p.hasSet === 'O' ? 'active' : ''}" onclick="selectSetOption('O', 'edit', '${p.id}')">있음 (O)</button>
                                    <button type="button" id="editSetBtnX_${p.id}" class="toggle-btn ${p.hasSet === 'X' ? 'active' : ''}" onclick="selectSetOption('X', 'edit', '${p.id}')">없음 (X)</button>
                                </div>
                                <input type="hidden" id="editHasSetValue_${p.id}" value="${p.hasSet}">
                            </div>
                            <div class="input-group">
                                <label>파레트당 카톤 수</label>
                                <input type="number" id="editPtoC_${p.id}" value="${p.palletToCarton}" onfocus="this.select()">
                            </div>
                            <div id="editSetFieldsO_${p.id}" class="conditional-fields" style="display:${p.hasSet === 'O' ? 'block' : 'none'};">
                                <div class="input-group">
                                    <label>카톤당 세트케이스 수</label>
                                    <input type="number" id="editCtoS_${p.id}" value="${p.cartonToSet || ''}" onfocus="this.select()">
                                </div>
                                <div class="input-group">
                                    <label>세트케이스당 단케이스 수</label>
                                    <input type="number" id="editStoI_${p.id}" value="${p.setToInner || ''}" onfocus="this.select()">
                                </div>
                            </div>
                            <div id="editSetFieldsX_${p.id}" class="conditional-fields" style="display:${p.hasSet === 'X' ? 'block' : 'none'};">
                                <div class="input-group">
                                    <label>카톤당 단케이스 수</label>
                                    <input type="number" id="editCtoIX_${p.id}" value="${p.cartonToInner || ''}" onfocus="this.select()">
                                </div>
                            </div>
                            <div class="input-group">
                                <label>단케이스당 반제품 수</label>
                                <input type="number" id="editItoU_${p.id}" value="${p.innerToUnit}" onfocus="this.select()" onkeydown="handleEditKey(event, '${p.id}')">
                            </div>
                            <button class="main-btn" style="padding: 10px; font-size: 14px;" onclick="updateProduct('${p.id}')">수정 완료 저장</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function toggleEditForm(id) {
            const box = document.getElementById(`editForm_${id}`);
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }

        function handleEditKey(e, id) { if (e.key === 'Enter') updateProduct(id); }

        async function updateProduct(id) {
            const name = document.getElementById(`editName_${id}`).value;
            const hasSet = document.getElementById(`editHasSetValue_${id}`).value;
            const pToC = Number(document.getElementById(`editPtoC_${id}`).value);
            const innerToUnit = Number(document.getElementById(`editItoU_${id}`).value);

            let data = { name, hasSet, palletToCarton: pToC, innerToUnit: innerToUnit };

            if (hasSet === 'O') {
                data.cartonToSet = Number(document.getElementById(`editCtoS_${id}`).value);
                data.setToInner = Number(document.getElementById(`editStoI_${id}`).value);
                data.cartonToInner = null;
            } else {
                data.cartonToInner = Number(document.getElementById(`editCtoIX_${id}`).value);
                data.cartonToSet = null;
                data.setToInner = null;
            }

            try {
                await db.collection('products').doc(id).update(data);
                alert(`✅ [${name}] 수정 완료!`);
                renderProductAdminList();
            } catch (e) {
                alert('❌ 수정에 실패했습니다.');
            }
        }

        async function deleteProduct(id, name) {
            if (confirm(`정말 [${name}] 품목을 삭제하시겠습니까?`)) {
                try {
                    await db.collection('products').doc(id).delete();
                    alert(`🗑️ [${name}] 삭제되었습니다.`);
                    renderProductAdminList();
                } catch (e) {
                    alert('❌ 삭제에 실패했습니다.');
                }
            }
        }

        function setCalcMode(mode) {
            currentCalcMode = mode;
            if (mode === 'SET') {
                document.getElementById('calcModeSet').classList.add('active');
                document.getElementById('calcModeEa').classList.remove('active');
            } else {
                document.getElementById('calcModeEa').classList.add('active');
                document.getElementById('calcModeSet').classList.remove('active');
            }
            autoCalculate();
        }

        function filterProducts() {
            const keyword = document.getElementById('productSearchInput').value.toLowerCase();
            const dropdown = document.getElementById('productSearchDropdown');
            dropdown.innerHTML = '';
            
            if (!keyword) { dropdown.style.display = 'none'; return; }

            const filtered = productList.filter(p => p.name.toLowerCase().includes(keyword));
            if (filtered.length === 0) { dropdown.style.display = 'none'; return; }

            filtered.forEach(p => {
                const item = document.createElement('div');
                item.className = 'search-item';
                item.innerText = `📦 ${p.name}`;
                item.onclick = () => {
                    document.getElementById('productSearchInput').value = p.name;
                    document.getElementById('selectedProductId').value = p.id;
                    dropdown.style.display = 'none';
                    autoCalculate();
                };
                dropdown.appendChild(item);
            });
            dropdown.style.display = 'block';
        }

        function autoCalculate() { if (document.getElementById('inputQty').value && document.getElementById('selectedProductId').value) calculateUnits(); }
        function handleCalcKey(e) { if (e.key === 'Enter') calculateUnits(); }
        function formatVal(val, decimals = 1) { return Number(val.toFixed(decimals)).toString(); }

        function calculateUnits() {
            const selectedId = document.getElementById('selectedProductId').value;
            const rawQty = Number(document.getElementById('inputQty').value);
            const resultBox = document.getElementById('calcResult');
            const p = productList.find(item => item.id === selectedId);
            
            if (!p || !rawQty) {
                resultBox.innerText = '⚠️ 제품과 올바른 수량을 다시 확인해 주세요.';
                return;
            }

            let cToI = (p.hasSet === 'O') ? (p.cartonToSet * p.setToInner) : p.cartonToInner;
            let innerPerCarton = cToI * p.innerToUnit; 
            let unitPerSet = (p.hasSet === 'O') ? (p.setToInner * p.innerToUnit) : p.innerToUnit; 

            let totalEa = (currentCalcMode === 'EA') ? rawQty : (rawQty * unitPerSet);
            let unitsPerPallet = p.palletToCarton * innerPerCarton;
            
            let totalPallets = formatVal(totalEa / unitsPerPallet, 1);
            let totalCartons = formatVal(totalEa / innerPerCarton, 1);
            let totalSets = (p.hasSet === 'O') ? formatVal(totalEa / (p.setToInner * p.innerToUnit), 1) : 0;
            let totalInners = formatVal(totalEa / p.innerToUnit, 1);

            let resultHtml = `<strong>📊 [${p.name}] 환산 결과</strong><br><br>`;
            resultHtml += `🅿️ 파레트 : <strong>${totalPallets}</strong> 개<br>`;
            resultHtml += `📦 카톤 : <strong>${totalCartons}</strong> 개<br>`;
            if (p.hasSet === 'O') {
                resultHtml += `🎁 세트케이스 : <strong>${totalSets}</strong> 개<br>`;
            }
            resultHtml += `🗂️ 단케이스 : <strong>${totalInners}</strong> 개<br>`;
            resultHtml += `⚙️ 반제품 : <strong>${totalEa.toLocaleString()}</strong> 개`;

            resultBox.innerHTML = resultHtml;
            resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        loadProductList();
    </script>
</body>
</html>
