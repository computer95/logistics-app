<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현장 물류 계산기</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f9fa;
            color: #333;
            padding-bottom: 70px;
        }
        .container {
            max-width: 500px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #111; }
        .input-group {
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            background: #fff;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 16px;
            margin-top: 5px;
        }
        .radio-group label {
            font-weight: normal;
            display: inline;
            cursor: pointer;
        }
        button {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #eef4ff;
            border-radius: 6px;
            font-weight: 600;
            line-height: 1.5;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .conditional-fields { display: none; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        .nav-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            background: none;
            border: none;
            margin: 0;
            padding: 0;
        }
        .nav-item.active {
            color: #007aff;
            background: #f0f7ff;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="calcTab" class="container tab-content active">
        <h2>현장 물류 계산기</h2>
        <div class="input-group">
            <label for="productSelect">제품 선택</label>
            <select id="productSelect" onchange="onProductChange()">
                <option value="">제품을 선택하세요</option>
            </select>
        </div>
        <div class="input-group">
            <label for="inputQty">입력 수량 (반제품 기준 개수)</label>
            <input type="number" id="inputQty" placeholder="수량을 입력하세요">
        </div>
        <button onclick="calculateUnits()">환산하기</button>
        
        <div id="calcResult" class="result-box">결과가 여기에 표시됩니다.</div>
    </div>

    <div id="registerTab" class="container tab-content">
        <h2>제품 구성 단위 등록</h2>
        <div class="input-group">
            <label for="regProductName">제품 이름</label>
            <input type="text" id="regProductName" placeholder="예: A제품">
        </div>
        <div class="input-group">
            <label>세트케이스 유무</label>
            <div class="radio-group">
                <input type="radio" id="hasSetO" name="hasSet" value="O" onclick="toggleSetFields('O')">
                <label for="hasSetO">있음 (O)</label>
                <input type="radio" id="hasSetX" name="hasSet" value="X" onclick="toggleSetFields('X')" checked>
                <label for="hasSetX">없음 (X)</label>
            </div>
        </div>

        <div class="input-group">
            <label for="regPalletToCarton">1 파레트당 카톤 수</label>
            <input type="number" id="regPalletToCarton" placeholder="예: 24">
        </div>

        <div id="setFieldsO" class="conditional-fields">
            <div class="input-group">
                <label for="regCartonToSet">1 카톤당 세트케이스 수</label>
                <input type="number" id="regCartonToSet" placeholder="예: 5">
            </div>
            <div class="input-group">
                <label for="regSetToInner">1 세트케이스당 단케이스 수</label>
                <input type="number" id="regSetToInner" placeholder="예: 6">
            </div>
        </div>

        <div id="setFieldsX" class="conditional-fields" style="display:block;">
            <div class="input-group">
                <label for="regCartonToInnerX">1 카톤당 단케이스 수</label>
                <input type="number" id="regCartonToInnerX" placeholder="예: 30">
            </div>
        </div>

        <div class="input-group">
            <label for="regInnerToUnit">1 단케이스당 반제품 수</label>
            <input type="number" id="regInnerToUnit" placeholder="예: 10">
        </div>

        <button onclick="saveProductConfig()">제품 등록하기</button>
        <div id="regResult" class="result-box" style="display:none;"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('calcTab', this)">계산기</button>
        <button class="nav-item" onclick="switchTab('registerTab', this)">제품등록</button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAxsMwsCYRP4AlCcUDVdg_xVb2yq3aREhg",
            authDomain: "logistics-f678d.firebaseapp.com",
            projectId: "logistics-f678d",
            storageBucket: "logistics-f678d.firebasestorage.app",
            messagingSenderId: "307386603286",
            appId: "1:307386603286:web:6a55d51ee4264812ece237"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let productList = [];

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');

            if (tabId === 'calcTab') {
                loadProductList();
            }
        }

        // 세트케이스 유무에 따라 입력란 토글
        function toggleSetFields(type) {
            if (type === 'O') {
                document.getElementById('setFieldsO').style.display = 'block';
                document.getElementById('setFieldsX').style.display = 'none';
            } else {
                document.getElementById('setFieldsO').style.display = 'none';
                document.getElementById('setFieldsX').style.display = 'block';
            }
        }

        async function saveProductConfig() {
            const name = document.getElementById('regProductName').value;
            const hasSet = document.querySelector('input[name="hasSet"]:checked').value;
            const pToC = document.getElementById('regPalletToCarton').value;
            const innerToUnit = document.getElementById('regInnerToUnit').value;
            const regResult = document.getElementById('regResult');

            let cartonToSet = 0;
            let setToInner = 0;
            let cartonToInner = 0;

            if (hasSet === 'O') {
                cartonToSet = document.getElementById('regCartonToSet').value;
                setToInner = document.getElementById('regSetToInner').value;
                if (!name || !pToC || !cartonToSet || !setToInner || !innerToUnit) {
                    regResult.style.display = 'block';
                    regResult.innerText = '모든 항목을 입력해 줘!';
                    return;
                }
            } else {
                cartonToInner = document.getElementById('regCartonToInnerX').value;
                if (!name || !pToC || !cartonToInner || !innerToUnit) {
                    regResult.style.display = 'block';
                    regResult.innerText = '모든 항목을 입력해 줘!';
                    return;
                }
            }

            try {
                await db.collection('products').add({
                    name: name,
                    hasSet: hasSet,
                    palletToCarton: Number(pToC),
                    cartonToSet: Number(cartonToSet),
                    setToInner: Number(setToInner),
                    cartonToInner: Number(cartonToInner),
                    innerToUnit: Number(innerToUnit),
                    timestamp: new Date()
                });

                regResult.style.display = 'block';
                regResult.innerText = `[${name}] 등록 완료!`;
                
                document.getElementById('regProductName').value = '';
                document.getElementById('regPalletToCarton').value = '';
                document.getElementById('regCartonToSet').value = '';
                document.getElementById('regSetToInner').value = '';
                document.getElementById('regCartonToInnerX').value = '';
                document.getElementById('regInnerToUnit').value = '';
            } catch (error) {
                console.error("등록 에러: ", error);
                regResult.style.display = 'block';
                regResult.innerText = '등록 실패!';
            }
        }

        async function loadProductList() {
            const select = document.getElementById('productSelect');
            select.innerHTML = '<option value="">제품을 선택하세요</option>';
            productList = [];

            try {
                const snapshot = await db.collection('products').get();
                snapshot.forEach(doc => {
                    const data = doc.data();
                    productList.push({ id: doc.id, ...data });
                    
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.innerText = data.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("제품 목록 로드 실패: ", error);
            }
        }

        function calculateUnits() {
            const selectedId = document.getElementById('productSelect').value;
            const qty = Number(document.getElementById('inputQty').value);
            const resultBox = document.getElementById('calcResult');

            if (!selectedId) {
                resultBox.innerText = '제품을 선택해 줘!';
                return;
            }
            if (!qty || qty <= 0) {
                resultBox.innerText = '유효한 수량을 입력해 줘!';
                return;
            }

            const p = productList.find(item => item.id === selectedId);
            if (!p) return;

            // 1카톤당 단케이스 수 계산
            let cToI = p.hasSet === 'O' ? (p.cartonToSet * p.setToInner) : p.cartonToInner;
            // 1카톤당 반제품 수
            const cartonToUnit = cToI * p.innerToUnit;
            // 1파레트당 반제품 수
            const unitsPerPallet = p.palletToCarton * cartonToUnit;

            const totalPallets = qty / unitsPerPallet;
            const fullPallets = Math.floor(totalPallets);
            
            const remPallets = qty % unitsPerPallet;
            const totalCartons = remPallets / cartonToUnit;
            const fullCartons = Math.floor(totalCartons);
            
            const remCartons = remPallets % cartonToUnit;
            const fullInners = Math.floor(remCartons / p.innerToUnit);
            const finalUnits = remCartons % p.innerToUnit;

            resultBox.innerHTML = `
                <strong>[${p.name}] 환산 결과</strong><br>
                입력 수량: ${qty.toLocaleString()} 개<br>
                👉 <strong>${totalPallets.toFixed(2)} 파레트</strong><br>
                (상세: ${fullPallets} 파레트 + ${fullCartons} 카톤 + ${fullInners} 단케이스 + ${finalUnits} 개)
            `;
        }

        loadProductList();
    </script>
</body>
</html>
