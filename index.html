<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물류 계산기</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f7f9fa;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #111; }
        .input-group {
            margin-bottom: 15px;
        }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #eef4ff;
            border-radius: 6px;
            font-weight: 600;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div class="container">
        <h2>현장 물류 계산기</h2>
        <div class="input-group">
            <label for="itemCode">품목 코드/이름</label>
            <input type="text" id="itemCode" placeholder="품목을 입력하세요">
        </div>
        <div class="input-group">
            <label for="quantity">수량</label>
            <input type="number" id="quantity" placeholder="수량을 입력하세요">
        </div>
        <button onclick="calculateData()">확인 및 전송</button>
        
        <div id="result">결과가 여기에 표시됩니다.</div>
    </div>

    <script>
        // PWA 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }

        // 파이어베이스 설정값 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyAxsMwsCYRP4AlCcUDVdg_xVb2yq3aREhg",
            authDomain: "logistics-f678d.firebaseapp.com",
            projectId: "logistics-f678d",
            storageBucket: "logistics-f678d.firebasestorage.app",
            messagingSenderId: "307386603286",
            appId: "1:307386603286:web:6a55d51ee4264812ece237"
        };

        // Firebase 연결 시작
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function calculateData() {
            const item = document.getElementById('itemCode').value;
            const qty = document.getElementById('quantity').value;
            const resultDiv = document.getElementById('result');

            if(!item || !qty) {
                resultDiv.innerText = '품목과 수량을 모두 입력해 줘!';
                return;
            }
            
            try {
                // Firestore의 'logistics'라는 이름의 데이터베이스 테이블(컬렉션)에 저장
                await db.collection('logistics').add({
                    itemCode: item,
                    quantity: Number(qty),
                    timestamp: new Date()
                });

                resultDiv.innerText = `저장 완료! [${item}] ${qty}개 데이터가 파이어베이스에 전송됐어!`;
                
                // 입력창 초기화
                document.getElementById('itemCode').value = '';
                document.getElementById('quantity').value = '';
            } catch (error) {
                console.error("저장 중 에러 발생: ", error);
                resultDiv.innerText = '전송 실패! 콘솔창을 확인해 줘.';
            }
        }
    </script>

</body>
</html>
